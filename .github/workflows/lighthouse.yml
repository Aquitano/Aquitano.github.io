name: Lighthouse CI

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

jobs:
    lighthouse:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v1
              with:
                  bun-version: latest

            - name: Cache bun dependencies
              uses: actions/cache@v4
              with:
                  path: ~/.bun/install/cache
                  key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
                  restore-keys: |
                      ${{ runner.os }}-bun-

            - name: Install dependencies
              run: |
                  rm -rf node_modules bun.lockb
                  bun install --no-frozen-lockfile

            - name: Rebuild sharp for linux-x64
              run: |
                  npm rebuild sharp --include=optional --platform=linux --arch=x64

            - name: Build site
              run: bun run build

            - name: Run Lighthouse CI
              uses: treosh/lighthouse-ci-action@v12
              with:
                  uploadArtifacts: true
                  temporaryPublicStorage: true
                  configPath: ./lighthouserc.json

            - name: Check Lighthouse scores
              uses: actions/github-script@v7
              with:
                  script: |
                      const fs = require('fs');
                      const path = '.lighthouseci';

                      if (!fs.existsSync(path)) {
                        console.log('No Lighthouse results found');
                        return;
                      }

                      const files = fs.readdirSync(path).filter(f => f.endsWith('.json') && f.startsWith('lhr-'));

                      for (const file of files) {
                        const data = JSON.parse(fs.readFileSync(`${path}/${file}`, 'utf8'));
                        const { categories } = data;
                        
                        console.log(`\n📊 Lighthouse Results for ${data.finalDisplayedUrl}:`);
                        console.log(`  Performance: ${Math.round(categories.performance.score * 100)}`);
                        console.log(`  Accessibility: ${Math.round(categories.accessibility.score * 100)}`);
                        console.log(`  Best Practices: ${Math.round(categories['best-practices'].score * 100)}`);
                        console.log(`  SEO: ${Math.round(categories.seo.score * 100)}`);
                        
                        // Check thresholds
                        const thresholds = {
                          performance: 90,
                          accessibility: 90,
                          'best-practices': 90,
                          seo: 90
                        };
                        
                        let failed = false;
                        for (const [key, threshold] of Object.entries(thresholds)) {
                          const score = Math.round(categories[key].score * 100);
                          if (score < threshold) {
                            console.log(`  ⚠️ ${key} (${score}) is below threshold (${threshold})`);
                            failed = true;
                          }
                        }
                        
                        if (failed) {
                          core.setFailed('Lighthouse scores below threshold');
                        }
                      }
